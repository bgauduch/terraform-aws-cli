name: release-please

# Single release workflow (ADR-0002, ADR-0003).
#
# On every push to master, release-please maintains a "Release PR" that bumps
# the project version (from Conventional Commits) and updates CHANGELOG.md.
# Merging that Release PR creates the GitHub release + the project version tag
# (vX.Y.Z); the build/push jobs below are gated on that release and publish the
# images. No separate release.yml and no Personal Access Token are needed — the
# build is wired in-workflow on the `release_created` output, so the default
# GITHUB_TOKEN (plus the existing DockerHub secrets) is enough. A final
# verify_release job asserts every expected tag is live on the registry, so a
# partial publication can never pass silently again (v8.1.0/v8.1.1 published
# zero images unnoticed — #106 finding of 2026-07-23).

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-22.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  load_supported_versions:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Save supported versions as output
        id: set-matrix
        run: |
          VERSIONS=$(cat ./supported_versions.json | jq -c)
          echo "matrix=${VERSIONS}" >> $GITHUB_OUTPUT

  build_push_release:
    needs: [release-please, load_supported_versions]
    runs-on: ubuntu-22.04

    strategy:
      # One flaky combo must not cancel the others: tags are independent and
      # immutable — a cancelled sibling is an unpublished tag (v8.1.0/v8.1.1)
      fail-fast: false
      matrix: ${{ fromJSON(needs.load_supported_versions.outputs.matrix) }}

    env:
      ORGANIZATION: "bgauduch"
      IMAGE_NAME: "terraform-aws-cli"
      RELEASE_VERSION: ${{ needs.release-please.outputs.tag_name }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Determine if this is the latest version combination
        run: |
          LATEST_TF=$(jq -r '.tf_versions | sort_by(split(".") | map(tonumber)) | .[-1]' supported_versions.json)
          LATEST_AWS=$(jq -r '.awscli_versions | sort_by(split(".") | map(tonumber)) | .[-1]' supported_versions.json)
          if [ "${{ matrix.tf_versions }}" = "${LATEST_TF}" ] && [ "${{ matrix.awscli_versions }}" = "${LATEST_AWS}" ]; then
            echo "IS_LATEST=true" >> $GITHUB_ENV
          else
            echo "IS_LATEST=false" >> $GITHUB_ENV
          fi

      - name: Login to Docker Hub registry
        run: echo '${{ secrets.DOCKERHUB_PAT }}' | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image (pinned combination)
        if: env.IS_LATEST != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/386
          build-args: |
            TERRAFORM_VERSION=${{ matrix.tf_versions }}
            AWS_CLI_VERSION=${{ matrix.awscli_versions }}
          tags: ${{ env.ORGANIZATION }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}_tf-${{ matrix.tf_versions }}_aws-${{ matrix.awscli_versions }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image (latest combination)
        if: env.IS_LATEST == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/386
          build-args: |
            TERRAFORM_VERSION=${{ matrix.tf_versions }}
            AWS_CLI_VERSION=${{ matrix.awscli_versions }}
          tags: |
            ${{ env.ORGANIZATION }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}_tf-${{ matrix.tf_versions }}_aws-${{ matrix.awscli_versions }}
            ${{ env.ORGANIZATION }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}
            ${{ env.ORGANIZATION }}/${{ env.IMAGE_NAME }}:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify_release:
    needs: [release-please, build_push_release]
    # Runs even when part of the matrix failed (not on cancel), so the run
    # reports exactly which expected tags are missing on the registry.
    if: ${{ !cancelled() && needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-22.04

    env:
      ORGANIZATION: "bgauduch"
      IMAGE_NAME: "terraform-aws-cli"
      RELEASE_VERSION: ${{ needs.release-please.outputs.tag_name }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Assert every expected tag is live on Docker Hub
        run: |
          set -euo pipefail
          missing=0
          check () {
            if curl --silent --fail --retry 5 --retry-delay 2 --retry-all-errors \
              "https://hub.docker.com/v2/repositories/${ORGANIZATION}/${IMAGE_NAME}/tags/$1" > /dev/null; then
              echo "OK       $1"
            else
              echo "MISSING  $1"
              missing=1
            fi
          }
          for tf in $(jq -r '.tf_versions[]' supported_versions.json); do
            for aws in $(jq -r '.awscli_versions[]' supported_versions.json); do
              check "${RELEASE_VERSION}_tf-${tf}_aws-${aws}"
            done
          done
          check "${RELEASE_VERSION}"
          check "latest"
          if [ "$missing" -ne 0 ]; then
            echo "::error::Release ${RELEASE_VERSION} is missing image tags on the registry — publication is incomplete."
            exit 1
          fi
