name: push-latest

# trigger on push to master
# only on Dockerfile related modifications
on:
  push:
    branches:
      - "master"
    paths:
      - ".dockerignore"
      - ".github/workflows/push-latest.yml"
      - "Dockerfile"
      - "hadolint.yaml"
      - "security/**"
      - "supported_versions.json"
      - "tests/**"

jobs:
  build_push_latest:
    runs-on: ubuntu-22.04

    permissions:
      packages: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Retrieve latest supported versions
        run: |
          echo "TF_VERSION=$(jq -r '.tf_versions | sort | .[-1]' supported_versions.json)" >> $GITHUB_ENV
          echo "AWS_VERSION=$(jq -r '.awscli_versions | sort | .[-1]' supported_versions.json)" >> $GITHUB_ENV

      - name: Login to Docker Hub registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push container images
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/386
          build-args: |
            TERRAFORM_VERSION=${{ env.TF_VERSION }}
            AWS_CLI_VERSION=${{ env.AWS_VERSION }}
          tags: |
            bgauduch/terraform-aws-cli:latest
            ghcr.io/bgauduch/terraform-aws-cli:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
