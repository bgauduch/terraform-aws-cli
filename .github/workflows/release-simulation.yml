name: release-simulation

# TEMPORARY VALIDATION WORKFLOW — deleted before merge.
#
# Mirrors the build path of release-please.yml's `build_push_release` job so a
# pull request can prove the release matrix builds end-to-end, without
# publishing: `push: false`, no registry login, release-please outputs stubbed.
# Secret-free by design — safe on pull_request (ADR-0013).

on:
  pull_request:
    paths:
      - ".github/workflows/release-simulation.yml"
      - "Dockerfile"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  load_supported_versions:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Save supported versions as output
        id: set-matrix
        run: |
          VERSIONS=$(cat ./supported_versions.json | jq -c)
          echo "matrix=${VERSIONS}" >> $GITHUB_OUTPUT

  build_release_simulation:
    needs: load_supported_versions
    runs-on: ubuntu-22.04

    strategy:
      # One flaky combo must not cancel the others (matrix jobs are independent)
      fail-fast: false
      matrix: ${{ fromJSON(needs.load_supported_versions.outputs.matrix) }}

    env:
      ORGANIZATION: "bgauduch"
      IMAGE_NAME: "terraform-aws-cli"
      # Stubbed release-please `tag_name` output
      RELEASE_VERSION: "v0.0.0-simulation"

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Determine if this is the latest version combination
        run: |
          LATEST_TF=$(jq -r '.tf_versions | sort_by(split(".") | map(tonumber)) | .[-1]' supported_versions.json)
          LATEST_AWS=$(jq -r '.awscli_versions | sort_by(split(".") | map(tonumber)) | .[-1]' supported_versions.json)
          if [ "${{ matrix.tf_versions }}" = "${LATEST_TF}" ] && [ "${{ matrix.awscli_versions }}" = "${LATEST_AWS}" ]; then
            echo "IS_LATEST=true" >> $GITHUB_ENV
          else
            echo "IS_LATEST=false" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (pinned combination, no push)
        if: env.IS_LATEST != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/386
          build-args: |
            TERRAFORM_VERSION=${{ matrix.tf_versions }}
            AWS_CLI_VERSION=${{ matrix.awscli_versions }}
          tags: ${{ env.ORGANIZATION }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}_tf-${{ matrix.tf_versions }}_aws-${{ matrix.awscli_versions }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build image (latest combination, no push)
        if: env.IS_LATEST == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/386
          build-args: |
            TERRAFORM_VERSION=${{ matrix.tf_versions }}
            AWS_CLI_VERSION=${{ matrix.awscli_versions }}
          tags: |
            ${{ env.ORGANIZATION }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}_tf-${{ matrix.tf_versions }}_aws-${{ matrix.awscli_versions }}
            ${{ env.ORGANIZATION }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}
            ${{ env.ORGANIZATION }}/${{ env.IMAGE_NAME }}:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
